<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>System_Monitor</title>
        <link rel="stylesheet" href="/css/deco.css" />
        <link rel="stylesheet" href="/css/control_window_style.css" />
        <link rel="stylesheet" href="/css/chart_style.css" />
        <link rel="stylesheet" href="/css/portals.css" />
        <link rel="shortcut icon" href="/favicon.png" type="image/x-icon" />
    </head>
    <body>
        <div class="container">
            <aside class="col-left section deco-panel">
                <div id="cpu-cluster"></div>
                <div id="temp-cluster"></div>
            </aside>
            <main class="col-center">
                <div class="deco-crest"></div>
                <div class="vitals-row deco-panel">
                    <div id="ram-gauge"></div>
                    <div id="net-down-gauge"></div>
                    <div id="net-up-gauge"></div>
                </div>
                <div class="display deco-panel plaque" data-plaque="specifications"></div>
                <div class="display_2 deco-panel plaque" data-plaque="teleprinter"></div>
                <div class="control2 deco-panel plaque" data-plaque="controls">
                    <div class="cover">
                        <div class="gate gate-left"></div>
                        <div class="gate gate-right"></div>
                    </div>
                    <canvas id="control2"></canvas>
                </div>
            </main>
            <aside class="col-right section deco-panel">
                <div id="storage-cluster"></div>
            </aside>
        </div>
        <script type="module" src="/main.js"></script>
    </body>
</html>
