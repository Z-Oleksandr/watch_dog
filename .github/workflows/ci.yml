name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Format check (advisory)
        run: cargo fmt --check
        continue-on-error: true

      - name: Clippy (advisory)
        run: cargo clippy --all-targets
        continue-on-error: true

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_panel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front_panel/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
